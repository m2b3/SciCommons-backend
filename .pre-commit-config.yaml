exclude: |
  (?x)^(
    .*/migrations/.*|
    venv/.*|
    env/.*|
    \.venv/.*|
    virtual/.*|
    environment/.*|
    Create/.*|
    named/.*|
    \#/.*|
    \#.*|
    __pycache__/.*|
    admin/.*|
    static/.*|
    .*/site-packages/.*|
    .*\.min\.js$|
    .*\.min\.css$
  )$

repos:
  # Remove unused imports and variables
  - repo: https://github.com/PyCQA/autoflake
    rev: v2.3.1
    hooks:
      - id: autoflake
        name: autoflake (remove unused imports)
        args:
          - --in-place
          - --remove-all-unused-imports
          - --remove-unused-variables
          - --ignore-init-module-imports

  # Code formatting
  - repo: https://github.com/pycqa/isort
    rev: 5.13.2
    hooks:
      - id: isort
        name: isort (python)
        args: ["--profile", "black"]

  - repo: https://github.com/psf/black
    rev: 24.4.2
    hooks:
      - id: black
        name: black (python)

  # Linting
  - repo: https://github.com/pycqa/flake8
    rev: 7.0.0
    hooks:
      - id: flake8
        name: flake8 (python)

  # Security checks
  - repo: https://github.com/PyCQA/bandit
    rev: 1.7.8
    hooks:
      - id: bandit
        name: bandit (security)
        args: ["-c", "pyproject.toml", "-ll"]  # -ll = only fail on medium+ severity
        additional_dependencies: ["bandit[toml]"]
        exclude: |
          (?x)^(
            .*/tests/.*|
            tests/.*
          )$

  # General file checks
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: check-yaml
        name: check yaml syntax
      - id: check-json
        name: check json syntax
      - id: check-toml
        name: check toml syntax
      - id: end-of-file-fixer
        name: fix end of files
      - id: trailing-whitespace
        name: trim trailing whitespace
      - id: check-merge-conflict
        name: check for merge conflicts
      - id: check-added-large-files
        name: check for large files
        args: ["--maxkb=1000"]
      - id: detect-private-key
        name: detect private keys

  # Django-specific checks (runs fast, catches common issues)
  - repo: local
    hooks:
      - id: django-check
        name: django check
        entry: poetry run python manage.py check --fail-level WARNING
        language: system
        pass_filenames: false
        always_run: true
        stages: [pre-push]
