<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body {
            margin: 0;
            padding: 20px;
            font-family: Arial, sans-serif;
            background-color: #f9fafb;
        }
        .container {
            width: 100%;
            max-width: 600px;
            margin: 0 auto;
            background-color: #ffffff;
            border: 1px solid #e5e7eb;
            border-radius: 12px;
            overflow: hidden;
        }
    </style>
</head>
<body>
    <div style="margin-bottom: 20px;">
        <span style="font-size: 16px; color: #374151;">{{ body }}</span>
    </div>

    <table class="container" cellpadding="0" cellspacing="0" border="0" role="presentation">
        <tr>
            <td style="padding: 30px;">
                <table width="100%" cellpadding="0" cellspacing="0" border="0" role="presentation">
                    <tr>
                        <td style="padding-bottom: 20px;">
                            <h2 style="margin: 0; font-size: 20px; font-weight: bold; color: #111827;">{{ community_name }}</h2>
                            <p style="margin: 4px 0 0 0; font-size: 14px; color: #6b7280;">{{ community_members }} members</p>
                        </td>
                    </tr>

                    <tr>
                        <td style="padding-bottom: 30px;">
                            <table cellpadding="0" cellspacing="0" border="0" role="presentation">
                                <tr>
                                    <td align="center" bgcolor="#40B75E" style="border-radius: 8px;">
                                        <a href="{{ referral_link }}" target="_blank"
                                            style="font-size: 16px; font-family: Arial, sans-serif; color: #ffffff; text-decoration: none; padding: 12px 25px; border-radius: 8px; border: 1px solid #40B75E; display: inline-block; font-weight: bold;">
                                            Accept Invitation
                                        </a>
                                    </td>
                                </tr>
                            </table>
                        </td>
                    </tr>

                    <tr>
                        <td style="border-top: 1px solid #f3f4f6; padding-top: 20px;">
                            <p style="margin: 0; font-size: 13px; color: #585858; line-height: 1.5;">
                                If the button doesn't work, click on this link:<br>
                                <a href="{{ referral_link }}" style="color: #40B75E; text-decoration: underline;">{{ referral_link }}</a>
                            </p>
                        </td>
                    </tr>
                </table>
            </td>
        </tr>
    </table>
</body>
</html>
